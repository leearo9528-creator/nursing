<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#EEF2FF">
  <title>Nurse Avengers — 간호사 진로 특강</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #EEF2FF;
      --surf:    #FFFFFF;
      --surf2:   #F8FAFC;
      --surf3:   #F1F5F9;
      --coral:   #E63946;
      --teal:    #0891B2;
      --gold:    #D97706;
      --purple:  #7C3AED;
      --green:   #16A34A;
      --text:    #0F172A;
      --muted:   #64748B;
      --border:  rgba(15,23,42,0.1);
      --shadow:  0 2px 8px rgba(15,23,42,0.08);
      --radius:  16px;
      --radius-s: 10px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    #app { min-height: 100vh; }

    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }
    b { font-weight: 700; }

    /* ===== SCREEN ===== */
    .screen { min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); animation: fadeUp .2s ease; }

    .screen-inner {
      flex: 1;
      padding: 1.25rem 1.25rem 2rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }
    .screen-inner.center {
      display: flex; flex-direction: column;
      align-items: center; text-align: center; justify-content: center;
    }

    /* ===== TOP BAR ===== */
    .top-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.75rem 1.25rem;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky; top: 0; z-index: 10;
    }
    .step-badge { font-size: 0.72rem; color: var(--muted); }
    .score-badge {
      font-size: 0.78rem; color: var(--teal);
      background: #E0F2FE;
      padding: 0.22rem 0.65rem;
      border-radius: 999px;
      border: 1px solid #BAE6FD;
    }

    /* ===== HEADINGS ===== */
    .section-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1.9rem; line-height: 1.2;
      color: var(--text); margin-bottom: 0.5rem;
    }
    .section-sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }

    /* ===== BUTTONS ===== */
    .btn {
      display: block; width: 100%;
      padding: 1rem 1.5rem;
      border: none; border-radius: var(--radius);
      font-family: 'Pretendard', sans-serif;
      font-size: 1rem; font-weight: 700;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
      text-align: center;
    }
    .btn:active { transform: scale(0.97); opacity: 0.85; }

    .btn-coral     { background: var(--coral); color: #fff; margin-top: 1.5rem; }
    .btn-teal      { background: var(--teal);  color: #fff; margin-top: 1.5rem; }
    .btn-secondary {
      background: var(--surf2); color: var(--text);
      border: 1px solid var(--border); width: 100%; margin-top: 0.75rem;
    }
    .btn-share {
      background: var(--surf); color: var(--teal);
      border: 1px solid var(--teal); margin-top: 1rem;
    }
    .btn-full { width: 100%; }

    /* ===== WELCOME ===== */
    .screen-welcome {
      background: linear-gradient(150deg, #EEF2FF 0%, #E0F2FE 60%, #F0FDF4 100%);
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding: 0 1.5rem 2rem;
    }
    .welcome-hero { flex: 1; display: flex; flex-direction: column; justify-content: center; padding-top: 4rem; }
    .hero-badge { font-size: 0.7rem; color: var(--teal); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 1rem; font-family: 'JetBrains Mono', monospace; }
    .hero-title { font-family: 'Archivo Black', sans-serif; font-size: 3.5rem; line-height: 1.1; color: var(--text); margin-bottom: 0.75rem; }
    .hero-sub { color: var(--muted); font-size: 1rem; }
    .welcome-form { padding-bottom: 2rem; }

    .resume-card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1rem; margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }
    .resume-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .resume-name  { font-weight: 700; color: var(--teal); margin-bottom: 0.5rem; }

    .form-label { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .name-input {
      width: 100%; padding: 0.9rem 1rem;
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius-s);
      color: var(--text); font-family: 'Pretendard', sans-serif; font-size: 1rem;
      outline: none; transition: border-color .2s; margin-bottom: 0.25rem;
      box-shadow: var(--shadow);
    }
    .name-input:focus { border-color: var(--teal); }

    /* ===== WORKPLACE CARDS ===== */
    .wp-list { display: flex; flex-direction: column; gap: 0.65rem; margin-bottom: 1.5rem; }
    .wp-card {
      display: flex; align-items: flex-start; gap: 0.9rem;
      background: var(--surf); border-radius: var(--radius-s);
      padding: 0.9rem 1rem; box-shadow: var(--shadow);
      border-left: 3px solid var(--teal);
    }
    .wp-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 0.1rem; }
    .wp-name { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.15rem; color: var(--text); }
    .wp-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }

    /* ===== STEPS LIST ===== */
    .steps-list { display: flex; flex-direction: column; gap: 0; margin-bottom: 1.5rem; }
    .step-row {
      display: flex; gap: 1rem; align-items: flex-start;
      padding: 0.85rem 0; border-bottom: 1px solid var(--border);
    }
    .step-row:last-child { border-bottom: none; }
    .step-num { font-size: 1.3rem; font-weight: 700; color: var(--coral); min-width: 2.2rem; line-height: 1; margin-top: 0.15rem; font-family: 'JetBrains Mono', monospace; }
    .step-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.15rem; color: var(--text); }
    .step-desc  { font-size: 0.82rem; color: var(--muted); }

    .reality-box {
      background: var(--surf); border-radius: var(--radius-s);
      border: 1px solid var(--border); padding: 1rem; margin-bottom: 1rem;
      box-shadow: var(--shadow);
    }
    .reality-title { font-size: 0.68rem; color: var(--gold); letter-spacing: 0.15em; margin-bottom: 0.65rem; font-family: 'JetBrains Mono', monospace; }
    .reality-item  { font-size: 0.85rem; padding: 0.25rem 0; color: var(--text); }

    /* ===== QUIZ ===== */
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .quiz-progress { font-size: 0.8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .streak-badge {
      font-size: 0.72rem; color: var(--gold);
      background: #FFFBEB; padding: 0.2rem 0.6rem;
      border-radius: 999px; border: 1px solid #FDE68A;
    }
    .quiz-card {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.5rem;
      margin-bottom: 1.5rem; min-height: 120px;
      display: flex; align-items: center; box-shadow: var(--shadow);
    }
    .quiz-q { font-size: 1.05rem; line-height: 1.65; font-weight: 600; color: var(--text); }

    /* ===== OX BUTTONS ===== */
    .ox-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .ox-btn {
      font-family: 'Archivo Black', sans-serif; font-size: 3.5rem;
      padding: 1.5rem; border: none; border-radius: var(--radius);
      cursor: pointer; transition: transform .1s, opacity .15s; line-height: 1;
      box-shadow: var(--shadow);
    }
    .ox-btn:active { transform: scale(0.94); }
    .ox-o { background: #E0F2FE; color: var(--teal); border: 2px solid var(--teal); }
    .ox-x { background: #FEE2E2; color: var(--coral); border: 2px solid var(--coral); }

    /* ===== FEEDBACK ===== */
    .feedback {
      border-radius: var(--radius); padding: 1.25rem;
      border: 1px solid var(--border); animation: fadeUp .25s ease;
      box-shadow: var(--shadow);
    }
    .feedback-correct { background: #F0FDF4; border-color: #BBF7D0; }
    .feedback-wrong   { background: #FEF2F2; border-color: #FECACA; }
    .feedback-sit     { background: var(--surf); }
    .feedback-icon { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text); }
    .feedback-tip  { font-size: 0.88rem; color: var(--muted); line-height: 1.6; margin-bottom: 1rem; }
    .bonus-badge {
      font-size: 0.78rem; color: var(--gold);
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: 999px; padding: 0.28rem 0.8rem;
      display: inline-block; margin-bottom: 1rem;
    }

    /* ===== SITUATION DRAMA ===== */
    .scene-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .scene-badge {
      font-size: 0.65rem; color: var(--coral);
      background: #FEE2E2; border: 1px solid #FECACA;
      border-radius: 999px; padding: 0.2rem 0.6rem;
      letter-spacing: 0.1em; font-family: 'JetBrains Mono', monospace;
    }
    .scene-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .scene-setup {
      background: var(--surf); border-radius: var(--radius-s);
      border-left: 3px solid var(--purple); padding: 1rem 1.1rem;
      font-size: 0.9rem; line-height: 1.7; color: var(--text);
      margin-bottom: 1.25rem; box-shadow: var(--shadow);
    }
    .choice-prompt { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.75rem; }
    .choices { display: flex; flex-direction: column; gap: 0.6rem; }
    .choice-btn {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius-s); color: var(--text);
      font-family: 'Pretendard', sans-serif; font-size: 0.88rem;
      line-height: 1.55; padding: 0.85rem 1rem;
      text-align: left; cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      box-shadow: var(--shadow);
    }
    .choice-btn:active { transform: scale(0.98); }
    .choice-btn:hover  { background: #EFF6FF; border-color: var(--teal); }

    /* ===== EMPATHY ===== */
    .empathy-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.4rem; }
    .empathy-bar-wrap { background: var(--surf3); border-radius: 999px; height: 8px; margin-bottom: 0.4rem; overflow: hidden; }
    .empathy-bar { height: 100%; background: linear-gradient(90deg, var(--teal), var(--purple)); border-radius: 999px; transition: width .6s ease; }
    .empathy-score { font-size: 1.2rem; color: var(--teal); margin-bottom: 0.75rem; font-family: 'JetBrains Mono', monospace; }

    /* ===== BREAK ===== */
    .screen-break {
      min-height: 100vh;
      background: linear-gradient(150deg, #EEF2FF, #E0F2FE);
      display: flex; align-items: center; justify-content: center;
    }
    .break-inner { text-align: center; padding: 2rem 1.5rem; max-width: 360px; }
    .break-icon  { font-size: 4rem; margin-bottom: 1rem; }
    .break-title { font-family: 'Archivo Black', sans-serif; font-size: 2rem; margin-bottom: 0.5rem; color: var(--text); }
    .break-sub   { color: var(--muted); font-size: 0.95rem; margin-bottom: 2rem; }
    .break-score { margin-bottom: 1.5rem; }
    .break-score-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.15em; font-family: 'JetBrains Mono', monospace; }
    .break-score-val   { font-size: 2rem; color: var(--teal); font-family: 'JetBrains Mono', monospace; }

    /* ===== TRIAGE THEORY CARDS ===== */
    .triage-cards { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1.25rem; }
    .triage-card  { border-radius: var(--radius-s); padding: 0.85rem 1rem; box-shadow: var(--shadow); }
    .triage-card-label { font-weight: 700; font-size: 0.9rem; margin-bottom: 0.2rem; }
    .triage-card-desc  { font-size: 0.82rem; opacity: 0.9; }

    .info-box {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius-s); padding: 0.9rem 1rem;
      font-size: 0.85rem; color: var(--muted); line-height: 1.6;
      margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .info-tag {
      font-size: 0.65rem; color: var(--gold);
      background: #FFFBEB; border: 1px solid #FDE68A;
      border-radius: 999px; padding: 0.15rem 0.5rem; margin-right: 0.5rem;
      font-family: 'JetBrains Mono', monospace; letter-spacing: 0.12em;
    }

    /* ===== TRIAGE GAME BUTTONS ===== */
    .triage-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.65rem; }
    .triage-btn {
      border: none; border-radius: var(--radius-s); padding: 1rem 0.75rem;
      cursor: pointer; transition: transform .1s, opacity .15s;
      display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
      color: #fff; box-shadow: var(--shadow);
    }
    .triage-btn:active { transform: scale(0.95); }
    .triage-btn-label { font-family: 'Archivo Black', sans-serif; font-size: 1.1rem; }
    .triage-btn-sub   { font-size: 0.72rem; opacity: 0.9; }
    .triage-answer-tag {
      display: inline-block; color: #fff; font-weight: 700; font-size: 0.9rem;
      padding: 0.3rem 0.8rem; border-radius: 999px; margin-bottom: 0.75rem;
    }

    /* ===== APTITUDE ===== */
    .apt-opts { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 1rem; }
    .apt-opt {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius-s); color: var(--text);
      font-family: 'Pretendard', sans-serif; font-size: 0.88rem;
      padding: 0.85rem 1rem; text-align: left; cursor: pointer;
      transition: background .15s, border-color .15s; box-shadow: var(--shadow);
    }
    .apt-opt:hover       { background: #EFF6FF; }
    .apt-opt-selected    { border-color: var(--purple); background: #F5F3FF; color: var(--purple); }

    .apt-result-card {
      background: var(--surf); border: 2px solid var(--teal);
      border-radius: var(--radius); padding: 1.75rem 1.5rem;
      text-align: center; width: 100%; box-shadow: var(--shadow);
    }
    .apt-icon       { font-size: 3rem; margin-bottom: 0.5rem; }
    .apt-type-title { font-family: 'Archivo Black', sans-serif; font-size: 1.5rem; margin-bottom: 0.2rem; }
    .apt-type-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.75rem; }
    .apt-desc       { font-size: 0.88rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.25rem; }
    .apt-tips       { text-align: left; }
    .apt-tips-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.12em; margin-bottom: 0.6rem; font-family: 'JetBrains Mono', monospace; }
    .apt-tip        { font-size: 0.85rem; color: var(--text); padding: 0.3rem 0; }

    /* ===== FINAL RANK ===== */
    .final-rank-card {
      background: var(--surf); border: 2px solid var(--gold);
      border-radius: var(--radius); padding: 2rem 1.5rem;
      text-align: center; width: 100%; box-shadow: var(--shadow);
    }
    .rank-icon  { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .rank-title { font-size: 1.5rem; margin-bottom: 0.2rem; font-family: 'JetBrains Mono', monospace; }
    .rank-sub   { font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem; }
    .rank-name  { font-weight: 700; font-size: 1rem; margin-bottom: 0.25rem; color: var(--text); }
    .rank-score { font-size: 2rem; color: var(--gold); font-family: 'JetBrains Mono', monospace; }

    .result-big   { font-size: 4rem; margin-bottom: 0.75rem; }
    .result-title { font-family: 'Archivo Black', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }
    .result-score { font-size: 2rem; color: var(--teal); margin-bottom: 0.75rem; font-family: 'JetBrains Mono', monospace; }
    .result-sub   { font-size: 0.88rem; color: var(--muted); margin-bottom: 1.25rem; line-height: 1.6; }

    /* ===== Q&A ===== */
    .qa-list { display: flex; flex-direction: column; gap: 0.5rem; margin-bottom: 2rem; }
    .qa-item {
      background: var(--surf); border: 1px solid var(--border);
      border-radius: var(--radius-s); cursor: pointer;
      overflow: hidden; transition: border-color .15s; box-shadow: var(--shadow);
    }
    .qa-item.qa-open { border-color: var(--teal); }
    .qa-q {
      display: flex; justify-content: space-between; align-items: center;
      gap: 0.5rem; padding: 0.9rem 1rem;
      font-size: 0.88rem; font-weight: 600; color: var(--text);
    }
    .qa-arrow { flex-shrink: 0; color: var(--muted); font-size: 0.7rem; }
    .qa-a {
      padding: 0.75rem 1rem 0.9rem;
      font-size: 0.85rem; color: var(--muted); line-height: 1.7;
      border-top: 1px solid var(--border);
    }

    /* ===== ANIMATION ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="app.js"></script>
</body>
</html>
