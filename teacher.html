<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Avengers — 간호사 진로 특강 수업자료</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    /* ════════════════════════════════════════════════════════════════
       DESIGN TOKENS
    ════════════════════════════════════════════════════════════════ */
    :root {
      /* Colors */
      --bg:       #F1F5F9;
      --surf:     #FFFFFF;
      --surf2:    #F8FAFC;
      --surf3:    #E2E8F0;
      --dark:     #0F172A;
      --text:     #0F172A;
      --sub:      #334155;
      --muted:    #64748B;
      --border:   rgba(15,23,42,0.10);
      --border-2: rgba(15,23,42,0.16);
      --accent:   #0891B2;

      /* Typography scale */
      --fs-hero:    clamp(3.2rem, 6.5vw, 5.2rem);
      --fs-h1:      clamp(2.1rem, 3.8vw, 3.1rem);
      --fs-h2:      clamp(1.25rem, 1.8vw, 1.45rem);
      --fs-body-lg: clamp(1.05rem, 1.55vw, 1.25rem);
      --fs-body:    clamp(0.95rem, 1.3vw, 1.1rem);
      --fs-sm:      clamp(0.85rem, 1.15vw, 0.95rem);
      --fs-meta:    0.72rem;

      /* Spacing (8px grid) */
      --pad-slide: clamp(2rem, 3.5vw, 3rem);
      --pad-card:  clamp(1.25rem, 1.6vw, 1.5rem);
      --gap-xs:    0.5rem;
      --gap-sm:    0.85rem;
      --gap-md:    1.25rem;
      --gap-lg:    2rem;

      /* Shape */
      --r-sm:  10px;
      --r-md:  14px;
      --r-lg:  20px;
      --r-xl:  24px;

      /* Shadow */
      --sh-s: 0 1px 3px rgba(15,23,42,0.06);
      --sh-m: 0 4px 16px rgba(15,23,42,0.08);
      --sh-l: 0 16px 40px rgba(15,23,42,0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3 { font-weight: 900; letter-spacing: -0.01em; }
    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }

    /* ════════════════════════════════════════════════════════════════
       STAGE LAYOUT
    ════════════════════════════════════════════════════════════════ */
    .stage {
      display: grid;
      grid-template-rows: 48px 1fr 52px;
      height: 100vh;
    }

    /* ── TOP BAR ── */
    .bar-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      padding: 0 1.25rem;
      position: relative;
    }
    .bar-top::after {
      content: '';
      position: absolute;
      inset: auto 0 0 0;
      height: 2px;
      background: var(--accent);
      transition: background .4s;
    }

    .tb-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .tb-logo span {
      font-family: 'Pretendard';
      font-weight: 500;
      color: var(--muted);
      font-size: 0.76rem;
      margin-left: 0.4rem;
    }

    .tb-center { display: flex; gap: 0.4rem; justify-self: center; }
    .period-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      padding: 0.28rem 0.85rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surf2);
      cursor: pointer;
      transition: all .2s;
    }
    .period-pill:hover { color: var(--accent); border-color: var(--accent); }
    .period-pill.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
    }

    .tb-right { display: flex; align-items: center; gap: 0.5rem; justify-self: end; }
    .tb-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--sub);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.22rem 0.6rem;
    }
    .tb-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      color: var(--muted);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.22rem 0.55rem;
    }

    /* ── SLIDE FRAME ── */
    .slide-frame { padding: 14px 16px; overflow: hidden; }

    .slide {
      height: 100%;
      background: var(--surf);
      border-radius: var(--r-xl);
      box-shadow: var(--sh-l);
      overflow: hidden;
      position: relative;
      transition: opacity .18s ease;
    }
    .slide.fading { opacity: 0; }

    /* ── BOTTOM BAR ── */
    .bar-bottom {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: var(--surf);
      border-top: 1px solid var(--border);
      padding: 0 1.25rem;
    }
    .btn-nav {
      background: var(--surf2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--sub);
      font-family: 'Pretendard';
      font-size: 0.85rem;
      font-weight: 700;
      padding: 0.48rem 1.4rem;
      cursor: pointer;
      transition: all .15s;
    }
    .btn-nav:hover:not(:disabled) { background: var(--surf3); border-color: var(--accent); color: var(--accent); }
    .btn-nav:disabled { opacity: 0.28; cursor: default; }
    .btn-next {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: var(--sh-m);
    }
    .btn-next:hover:not(:disabled) {
      background: color-mix(in srgb, var(--accent) 85%, black);
      color: #fff;
    }
    .prog-rail {
      flex: 1;
      height: 5px;
      background: var(--surf3);
      border-radius: 999px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width .35s, background .4s;
    }

    /* ════════════════════════════════════════════════════════════════
       PERSISTENT QR (우측 하단 고정)
    ════════════════════════════════════════════════════════════════ */
    .slide-qr {
      position: absolute;
      right: 16px;
      bottom: 16px;
      background: var(--surf);
      border-radius: var(--r-md);
      padding: 8px 10px 10px;
      box-shadow: var(--sh-l);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 5;
      border: 1px solid var(--border);
      transition: all .3s;
    }
    .slide-qr-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.12em;
      transition: color .3s;
    }
    .slide-qr-img {
      width: 96px;
      height: 96px;
      display: block;
    }
    .slide-qr-img img, .slide-qr-img canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .slide-qr-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.55rem;
      color: var(--muted);
      max-width: 96px;
      text-align: center;
      word-break: break-all;
      line-height: 1.2;
    }

    /* Hide QR on dark slides and show a white variant */
    .slide-dark .slide-qr {
      background: rgba(255,255,255,0.95);
      border-color: rgba(255,255,255,0.3);
    }

    /* Larger QR on activity slides */
    .slide-activity .slide-qr {
      right: auto;
      left: auto;
      position: static;
      box-shadow: var(--sh-l);
    }
    .slide-activity .slide-qr-img { width: 180px; height: 180px; }
    .slide-activity .slide-qr-label { font-size: 0.7rem; }
    .slide-activity .slide-qr-url  { max-width: 180px; font-size: 0.65rem; }

    /* ════════════════════════════════════════════════════════════════
       SLIDE CONTENT — 모든 슬라이드 공통 컨테이너
    ════════════════════════════════════════════════════════════════ */
    .sc {
      height: 100%;
      padding: var(--pad-slide);
      display: flex;
      flex-direction: column;
    }

    /* Top meta row (tag + label) */
    .sc-meta {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .sc-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.28rem 0.7rem;
      border-radius: 6px;
      border: 1.5px solid;
    }
    .sc-kicker {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
    }

    /* Titles */
    .sc-h1 {
      font-family: 'Archivo Black', sans-serif;
      font-size: var(--fs-h1);
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 1.25rem;
      white-space: pre-line;
    }
    .sc-sub {
      font-size: var(--fs-body-lg);
      color: var(--sub);
      line-height: 1.55;
      font-weight: 500;
      margin-bottom: 1.5rem;
      max-width: 800px;
    }

    /* ══════════════════════════════════════════════════════════════
       LAYOUT 1 · CENTERED — cover / section / closing / qa-open / cp
    ══════════════════════════════════════════════════════════════ */
    .sc-centered {
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .sc-centered .sc-h1 { font-size: var(--fs-hero); margin-bottom: 1rem; }
    .sc-centered .sc-sub { font-size: var(--fs-body-lg); }

    /* Cover variant (gradient background) */
    .slide-cover .slide { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #0F172A) 100%); color: #fff; }
    .slide-cover .sc-h1 { color: #fff; text-shadow: 0 2px 20px rgba(0,0,0,0.15); }
    .slide-cover .sc-sub { color: rgba(255,255,255,0.88); }
    .slide-cover .sc-kicker {
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 0.35rem 1rem;
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Section divider (dark background) */
    .slide-section .slide { background: var(--dark); color: #fff; }
    .slide-section .sc-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(4rem, 8vw, 7rem);
      color: transparent;
      -webkit-text-stroke: 2.5px color-mix(in srgb, var(--accent) 75%, transparent);
      line-height: 1;
      margin-bottom: 1rem;
      letter-spacing: -0.03em;
    }
    .slide-section .sc-h1 { color: #fff; font-size: clamp(2.4rem, 5vw, 4rem); }
    .slide-section .sc-sub { color: rgba(255,255,255,0.7); }
    .slide-section::before {
      content: '';
      position: absolute;
      left: 0; top: 20%; bottom: 20%;
      width: 8px;
      background: var(--accent);
      border-radius: 0 8px 8px 0;
    }

    /* QA Open + Closing Period (light gradient) */
    .slide-light-gradient .slide { background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%); }

    /* Final Closing (accent gradient) */
    .slide-closing .slide { background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 60%, #0F172A) 100%); color: #fff; }
    .slide-closing .sc-h1 { color: #fff; line-height: 1.25; }
    .slide-closing .sc-sub { color: rgba(255,255,255,0.85); }

    /* Icon block (cover/section icons) */
    .sc-icon { font-size: clamp(3rem, 5vw, 4rem); margin-bottom: 1rem; }

    /* ══════════════════════════════════════════════════════════════
       LAYOUT 2 · SIDED — theory (title+points | image)
    ══════════════════════════════════════════════════════════════ */
    .sc-sided {
      flex-direction: row;
      gap: var(--gap-lg);
      align-items: center;
      padding-right: calc(var(--pad-slide) + 130px); /* leave room for QR */
    }
    .sc-sided .sc-left { flex: 1; min-width: 0; }
    .sc-sided .sc-media {
      flex-basis: 42%;
      aspect-ratio: 4/3;
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--sh-l);
      background: var(--surf3);
      flex-shrink: 0;
    }
    .sc-sided .sc-media img, .sc-sided .sc-media iframe {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      border: none;
    }

    .sc-points {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: var(--gap-sm);
      margin-top: 0.5rem;
    }
    .sc-points li {
      font-size: var(--fs-body-lg);
      color: var(--sub);
      line-height: 1.6;
      padding-left: 1.75rem;
      position: relative;
      font-weight: 500;
    }
    .sc-points li::before {
      content: '✓';
      position: absolute; left: 0;
      color: var(--accent);
      font-weight: 900;
    }

    .sc-note {
      margin-top: 1.25rem;
      font-size: var(--fs-body);
      color: var(--accent);
      font-weight: 700;
      padding: 0.7rem 1rem;
      background: color-mix(in srgb, var(--accent) 8%, white);
      border-radius: var(--r-sm);
      border-left: 3px solid var(--accent);
    }

    /* ══════════════════════════════════════════════════════════════
       LAYOUT 3 · GRID — cards / triage / types / qa-grid / icebreak / steps
    ══════════════════════════════════════════════════════════════ */
    .sc-title-center { text-align: center; margin-bottom: 1.75rem; }
    .sc-title-center .sc-h1 { margin-bottom: 0.4rem; }

    .sc-grid {
      display: grid;
      gap: var(--gap-md);
      flex: 1;
      min-height: 0;
      padding-bottom: 120px; /* room for QR */
    }
    .sc-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
    .sc-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .sc-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
    .sc-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }

    /* Base card */
    .sc-card {
      background: var(--surf);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      padding: var(--pad-card);
      box-shadow: var(--sh-s);
      display: flex;
      flex-direction: column;
      gap: var(--gap-xs);
      transition: transform .2s, box-shadow .2s, border-color .2s;
    }
    .sc-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--sh-m);
      border-color: var(--c, var(--accent));
    }

    /* Icon card (6 workplaces, 5 types, 8 QA chips) */
    .ic-card { text-align: center; align-items: center; border-top: 4px solid var(--c, var(--accent)); }
    .ic-icon { font-size: clamp(2.8rem, 4.5vw, 3.8rem); }
    .ic-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.3rem, 2vw, 1.7rem);
      color: var(--c, var(--text));
      line-height: 1.2;
    }
    .ic-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }
    .ic-desc {
      font-size: var(--fs-sm);
      color: var(--sub);
      line-height: 1.5;
      margin-top: 0.3rem;
    }

    /* Triage card — default: solid color block */
    .tr-card {
      background: var(--c);
      border-left: none;
      border-top: none;
      gap: 0;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, border-left 0.3s;
      user-select: none;
    }
    .tr-card .tr-row { display: flex; align-items: baseline; gap: 0.6rem; }
    .tr-card .tr-label {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 3.5vw, 3rem);
      color: #fff;
      transition: color 0.3s, font-size 0.3s;
    }
    .tr-card .tr-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.15em;
      transition: color 0.3s;
    }
    .tr-card .tr-desc {
      display: none;
      font-size: var(--fs-body);
      color: var(--text);
      font-weight: 600;
    }
    .tr-card .tr-ex {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--sub);
      background: var(--surf2);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
    }
    /* open state: current design */
    .tr-card.open {
      background: var(--surf);
      border-left: 8px solid var(--c);
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0.45rem;
    }
    .tr-card.open .tr-label { color: var(--c); font-size: clamp(1.3rem, 2vw, 1.7rem); }
    .tr-card.open .tr-sub   { color: var(--muted); }
    .tr-card.open .tr-desc  { display: block; }
    .tr-card.open .tr-ex    { display: block; }

    /* Numbered step (5 steps) */
    .st-card {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border-left: 4px solid var(--accent);
      background: var(--surf2);
      border-top: none;
    }
    .st-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      color: var(--accent);
      min-width: 60px;
      line-height: 1;
    }
    .st-body { flex: 1; }
    .st-h { font-size: var(--fs-h2); font-weight: 700; margin-bottom: 0.2rem; color: var(--text); }
    .st-p { font-size: var(--fs-sm); color: var(--sub); line-height: 1.5; }

    /* Icebreak numbered card */
    .ib-card {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      background: var(--surf2);
      border-left: 4px solid var(--accent);
      border-top: none;
    }
    .ib-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.4rem);
      color: var(--accent);
      min-width: 56px;
      line-height: 1;
    }
    .ib-text {
      font-size: var(--fs-body-lg);
      color: var(--text);
      font-weight: 500;
      line-height: 1.5;
    }

    /* ══════════════════════════════════════════════════════════════
       LAYOUT 4 · ACTIVITY (학생 참여)
    ══════════════════════════════════════════════════════════════ */
    .slide-activity .slide {
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 65%, #0F172A) 100%);
      color: #fff;
    }
    .sc-act {
      padding: var(--pad-slide);
      height: 100%;
      display: flex;
      gap: var(--gap-lg);
      align-items: center;
    }
    .sc-act .sc-left { flex: 1.35; }
    .sc-act .sc-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sc-act .sc-tag {
      background: rgba(255,255,255,0.18);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }
    .sc-act .sc-h1 { color: #fff; margin-bottom: 0.75rem; }
    .sc-act .sc-sub { color: rgba(255,255,255,0.9); }
    .sc-act .sc-icon { font-size: 3rem; margin-bottom: 0.5rem; }

    .sc-rules {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin: 1.25rem 0;
    }
    .sc-rule {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: var(--r-sm);
      padding: 0.7rem 1.1rem;
    }
    .sc-ri {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.95rem;
      background: #fff;
      color: var(--accent);
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .sc-rt { font-size: var(--fs-body); color: #fff; font-weight: 500; }

    .sc-hint {
      font-size: var(--fs-sm);
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.22);
      padding: 0.7rem 1rem;
      border-radius: var(--r-sm);
      border-left: 3px solid #fff;
      font-weight: 500;
    }

    .sc-act-qr {
      background: #fff;
      border-radius: var(--r-lg);
      padding: 1.25rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.35);
      text-align: center;
      color: var(--text);
    }
    .sc-act-qr-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.18em;
      margin-bottom: 0.65rem;
    }
    .sc-act-qr-img img { display: block; width: 200px; height: 200px; }
    .sc-act-qr-url {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--sub);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.55rem;
      margin-top: 0.65rem;
      word-break: break-all;
      line-height: 1.4;
      max-width: 200px;
    }

    /* Activity slide hides the floating QR (uses embedded one) */
    .slide-activity .slide > .slide-qr { display: none; }

    /* ══════════════════════════════════════════════════════════════
       IMAGE COLLAGE — 이미지 그리드
    ══════════════════════════════════════════════════════════════ */
    .im-card {
      position: relative;
      border-radius: var(--r-md);
      overflow: hidden;
      border: 1.5px solid var(--border);
      box-shadow: var(--sh-s);
      aspect-ratio: 4/3;
      background: var(--surf3);
      transition: transform .2s, box-shadow .2s;
    }
    .im-card:hover { transform: translateY(-2px); box-shadow: var(--sh-m); }
    .im-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .im-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, rgba(15,23,42,0.82) 0%, rgba(15,23,42,0.0) 100%);
      color: #fff;
      padding: 1.2rem 0.9rem 0.7rem;
      font-size: var(--fs-sm);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    /* ══════════════════════════════════════════════════════════════
       BUBBLES — 생각 버블 클라우드
    ══════════════════════════════════════════════════════════════ */
    .bubble-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 0.9rem;
      justify-content: center;
      align-items: center;
      padding: 1rem 2rem;
      flex: 1;
    }
    .bubble {
      background: #fff;
      border: 3px solid var(--bc, #D97706);
      border-radius: 999px;
      color: var(--text);
      font-weight: 700;
      line-height: 1.2;
      padding: 0.55em 1.2em;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .bubble-sm { font-size: clamp(0.9rem, 1.4vw, 1.1rem); }
    .bubble-md { font-size: clamp(1.1rem, 1.8vw, 1.4rem); }
    .bubble-lg { font-size: clamp(1.3rem, 2.2vw, 1.8rem); }
    .bubble-xl { font-size: clamp(1.6rem, 2.8vw, 2.3rem); font-weight: 900; }

    /* ══════════════════════════════════════════════════════════════
       QA LIST — 클릭해서 답변 펼치기
    ══════════════════════════════════════════════════════════════ */
    .qa-list {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      flex: 1;
      min-height: 0;
      overflow-y: auto;
    }
    .qa-item {
      background: var(--surf);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--sh-s);
      overflow: hidden;
      transition: border-color .2s, box-shadow .2s;
    }
    .qa-item:hover { border-color: var(--accent); }
    .qa-item.open { border-color: var(--accent); box-shadow: var(--sh-m); }

    .qa-q-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1.2rem;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      font-family: 'Pretendard';
    }
    .qa-q-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--accent);
      min-width: 28px;
    }
    .qa-q-text {
      flex: 1;
      font-size: var(--fs-body-lg);
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .qa-q-toggle {
      font-size: 0.72rem;
      font-weight: 700;
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      padding: 0.28rem 0.8rem;
      flex-shrink: 0;
      transition: background .2s;
    }
    .qa-item.open .qa-q-toggle {
      background: var(--muted);
    }
    .qa-item.open .qa-q-toggle::before { content: '닫기'; }
    .qa-item.open .qa-q-toggle { font-size: 0; padding: 0.28rem 0.8rem; }
    .qa-item.open .qa-q-toggle::before { font-size: 0.72rem; }

    .qa-a-box {
      display: none;
      padding: 0.9rem 1.2rem 1rem calc(28px + 1.2rem + 0.85rem);
      background: color-mix(in srgb, var(--accent) 6%, white);
      border-top: 1px solid var(--border);
      font-size: var(--fs-body);
      color: var(--sub);
      line-height: 1.65;
      font-weight: 500;
    }
    .qa-item.open .qa-a-box { display: block; }
  </style>
</head>
<body>

<div class="stage">

  <!-- TOP BAR -->
  <header class="bar-top">
    <div class="tb-logo">🏥 NURSE AVENGERS <span>간호사 진로 특강</span></div>
    <div class="tb-center">
      <button id="p1Btn" class="period-pill" onclick="jumpPeriod(1)">1교시</button>
      <button id="p2Btn" class="period-pill" onclick="jumpPeriod(2)">2교시</button>
    </div>
    <div class="tb-right">
      <div id="slideCounter" class="tb-counter">1 / 29</div>
      <div class="tb-hint">← → Space</div>
    </div>
  </header>

  <!-- SLIDE -->
  <div class="slide-frame" id="slideFrame">
    <div class="slide" id="slide"></div>
  </div>

  <!-- BOTTOM BAR -->
  <footer class="bar-bottom">
    <button id="prevBtn" class="btn-nav" onclick="prev()">← 이전</button>
    <div class="prog-rail"><div id="progBar" class="prog-fill"></div></div>
    <button id="nextBtn" class="btn-nav btn-next" onclick="next()">다음 →</button>
  </footer>

</div>

<script src="teacher.js"></script>
</body>
</html>
