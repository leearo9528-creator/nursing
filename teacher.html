<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Avengers — 선생님 화면</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #EEF2FF;
      --surf:   #FFFFFF;
      --surf2:  #F8FAFC;
      --surf3:  #F1F5F9;
      --coral:  #E63946;
      --teal:   #0891B2;
      --gold:   #D97706;
      --purple: #7C3AED;
      --green:  #16A34A;
      --text:   #0F172A;
      --muted:  #64748B;
      --border: rgba(15,23,42,0.1);
      --shadow: 0 1px 4px rgba(15,23,42,0.08);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.04em; }

    /* ===== LAYOUT ===== */
    .layout {
      display: grid;
      grid-template-columns: 268px 1fr 240px;
      grid-template-rows: 56px 1fr 64px;
      height: 100vh;
      gap: 0;
      transition: grid-template-columns .25s ease;
    }
    .layout.sidebar-collapsed {
      grid-template-columns: 44px 1fr 240px;
    }

    /* ===== HEADER ===== */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .header-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1rem;
      color: var(--teal);
      letter-spacing: 0.06em;
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .period-ind {
      font-size: 0.72rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      padding: 0.22rem 0.75rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surf2);
      transition: all .2s;
    }
    .period-ind.active {
      color: var(--surf);
      border-color: var(--teal);
      background: var(--teal);
    }

    .lesson-dots { display: flex; gap: 0.3rem; align-items: center; }
    .lesson-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--surf3);
      border: 1px solid var(--border);
      transition: background .2s;
      cursor: pointer;
    }
    .lesson-dot.active { background: var(--teal); border-color: var(--teal); }
    .lesson-dot.done   { background: var(--border); border-color: var(--muted); }

    .header-hint { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* ===== SIDEBAR LEFT ===== */
    .sidebar-left {
      background: var(--surf);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 44px;
    }

    .sidebar-title {
      font-size: 0.62rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
      overflow: hidden;
    }

    .sidebar-toggle {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.7rem;
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: color .15s, border-color .15s, background .15s;
    }
    .sidebar-toggle:hover { color: var(--teal); border-color: var(--teal); background: #E0F2FE; }

    .sidebar-body { overflow-y: auto; flex: 1; }

    .layout.sidebar-collapsed .sidebar-title,
    .layout.sidebar-collapsed .sidebar-body { display: none; }
    .layout.sidebar-collapsed .sidebar-header { justify-content: center; padding: 0.65rem 0; }

    .lesson-item {
      padding: 0.6rem 0.85rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .lesson-item:hover  { background: var(--surf2); }
    .lesson-item.active { background: #EFF6FF; border-left-color: var(--lesson-color, var(--teal)); }

    .lesson-item-tag   { font-size: 0.6rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 0.1rem; color: var(--muted); }
    .lesson-item-label { font-size: 0.8rem; font-weight: 600; line-height: 1.3; margin-bottom: 0.1rem; color: var(--text); }
    .lesson-item-dur   { font-size: 0.65rem; color: var(--muted); }

    /* ===== MAIN SLIDE AREA ===== */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.75rem 2.5rem 1.5rem;
      gap: 0.85rem;
      background: var(--bg);
    }

    .slide-meta {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .lesson-tag {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.08em;
      padding: 0.22rem 0.7rem;
      border-radius: 999px;
      border: 1px solid;
    }

    .lesson-label { font-size: 0.82rem; color: var(--muted); }

    .lesson-time {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--gold);
      background: #FFFBEB;
      border: 1px solid #FDE68A;
      border-radius: 999px;
      padding: 0.2rem 0.65rem;
    }

    .slide-progress-wrap {
      height: 4px;
      background: var(--surf3);
      border-radius: 999px;
      overflow: hidden;
    }
    .slide-progress {
      height: 100%;
      border-radius: 999px;
      transition: width .3s ease, background .3s;
    }

    /* slide layout: text left, image right */
    .slide-layout {
      flex: 1;
      display: flex;
      gap: 2rem;
      align-items: center;
      overflow: hidden;
    }

    .slide-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
    }

    #slideTitle {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.8rem, 3.2vw, 3rem);
      line-height: 1.2;
      color: var(--text);
      margin-bottom: 1.25rem;
      white-space: pre-line;
    }

    #slideBody {
      font-size: clamp(0.95rem, 1.6vw, 1.35rem);
      line-height: 1.8;
      color: var(--muted);
      white-space: pre-line;
    }

    .slide-counter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 1.25rem;
    }

    .slide-image-wrap {
      width: 38%;
      flex-shrink: 0;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(15,23,42,0.12);
      background: var(--surf3);
      aspect-ratio: 4/3;
      display: none;
    }
    .slide-image-wrap.has-image { display: block; }
    .slide-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    /* no-image: center text */
    .slide-layout.no-image .slide-text {
      align-items: center;
      text-align: center;
    }
    .slide-layout.no-image #slideTitle { font-size: clamp(2rem, 4vw, 3.5rem); }
    .slide-layout.no-image #slideBody  { font-size: clamp(1rem, 1.8vw, 1.5rem); max-width: 700px; }

    /* ===== FOOTER ===== */
    .footer {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.25rem;
      background: var(--surf);
      border-top: 1px solid var(--border);
      box-shadow: 0 -1px 4px rgba(15,23,42,0.06);
    }

    .nav-btn {
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Pretendard', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.55rem 2rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .nav-btn:hover:not(:disabled) { background: var(--surf3); border-color: var(--teal); }
    .nav-btn:active:not(:disabled) { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.3; cursor: default; }
    .nav-btn-next { background: var(--teal); color: #fff; border-color: var(--teal); }
    .nav-btn-next:hover:not(:disabled) { background: #0779A0; }

    .nav-hint { font-size: 0.7rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

    /* ===== SIDEBAR RIGHT — QR only ===== */
    .sidebar-right {
      background: var(--surf);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
      gap: 1rem;
    }

    .qr-label {
      font-size: 0.62rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.12em;
      text-align: center;
    }

    #qrcode {
      background: var(--surf2);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 12px;
      display: inline-block;
    }
    #qrcode img, #qrcode canvas { display: block; }

    .qr-url {
      font-size: 0.68rem;
      color: var(--teal);
      font-family: 'JetBrains Mono', monospace;
      word-break: break-all;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <!-- HEADER -->
  <header class="header">
    <div class="header-logo">NURSE · AVENGERS — 선생님 화면</div>
    <div class="header-meta">
      <div id="period1Ind" class="period-ind">1교시</div>
      <div id="period2Ind" class="period-ind">2교시</div>
      <div class="lesson-dots" id="lessonDots"></div>
    </div>
    <div class="header-hint mono">← → Space 슬라이드 이동</div>
  </header>

  <!-- SIDEBAR LEFT -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <div class="sidebar-title">수업 흐름</div>
      <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="접기/펼치기">✕</button>
    </div>
    <div class="sidebar-body">
      <div id="lessonList"></div>
    </div>
  </aside>

  <!-- MAIN SLIDE -->
  <main class="main">
    <div class="slide-meta">
      <div id="lessonTag" class="lesson-tag">이론</div>
      <div id="lessonLabel" class="lesson-label">1교시 · STEP 1</div>
      <div id="lessonTime" class="lesson-time">8분</div>
    </div>
    <div class="slide-progress-wrap">
      <div id="slideProgress" class="slide-progress" style="width:20%"></div>
    </div>
    <div class="slide-layout" id="slideLayout">
      <div class="slide-text">
        <div id="slideTitle">슬라이드 제목</div>
        <div id="slideBody">내용이 여기에 표시됩니다.</div>
        <div id="slideCount" class="slide-counter mono">1 / 1</div>
      </div>
      <div class="slide-image-wrap" id="slideImageWrap">
        <img id="slideImg" src="" alt="" style="display:none">
        <iframe id="slideVideo" src="" frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen style="display:none;width:100%;height:100%;border:none;"></iframe>
      </div>
    </div>
  </main>

  <!-- SIDEBAR RIGHT — QR only -->
  <aside class="sidebar-right">
    <div class="qr-label">학생 접속 QR</div>
    <div id="qrcode"></div>
    <div id="studentUrl" class="qr-url">로딩 중...</div>
  </aside>

  <!-- FOOTER -->
  <footer class="footer">
    <button id="prevBtn" class="nav-btn" onclick="prevSlide()">← 이전</button>
    <span class="nav-hint">Space / → 다음 슬라이드</span>
    <button id="nextBtn" class="nav-btn nav-btn-next" onclick="nextSlide()">다음 →</button>
  </footer>

</div>
<script src="teacher.js"></script>
<script>
  (() => {
    const dotsEl = document.getElementById('lessonDots');
    if (dotsEl && typeof LESSON !== 'undefined') {
      dotsEl.innerHTML = LESSON.map((_,i) => `<div class="lesson-dot" onclick="goToLesson(${i})"></div>`).join('');
    }
  })();
</script>
</body>
</html>
