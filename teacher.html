<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Avengers — 선생님 수업 자료</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F0F4FF;
      --surf:     #FFFFFF;
      --surf2:    #F8FAFC;
      --surf3:    #EEF2F7;
      --text:     #0D1B2A;
      --sub:      #334155;
      --muted:    #7C8FA6;
      --border:   rgba(13,27,42,0.09);
      --accent:   #0891B2;
      --shadow-s: 0 1px 3px rgba(13,27,42,0.07);
      --shadow-m: 0 6px 20px rgba(13,27,42,0.10);
      --shadow-l: 0 20px 60px rgba(13,27,42,0.15);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }

    h1 { font-weight: 900; }

    /* ═════════════════════════════════════════════
       STAGE — 전체 레이아웃
    ═════════════════════════════════════════════ */
    .stage {
      display: grid;
      grid-template-rows: 48px 1fr 56px;
      height: 100vh;
    }

    /* ═════════════════════════════════════════════
       TOP BAR
    ═════════════════════════════════════════════ */
    .bar-top {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-s);
      padding: 0 1.25rem;
      position: relative;
    }
    .bar-top::after {
      content: '';
      position: absolute;
      left: 0; right: 0; bottom: 0;
      height: 2px;
      background: var(--accent);
      transition: background .4s ease;
    }

    .tb-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.05em;
      color: var(--text);
    }
    .tb-logo span {
      font-family: 'Pretendard';
      font-weight: 500;
      color: var(--muted);
      font-size: 0.78rem;
      margin-left: 0.4rem;
    }

    .tb-center { display: flex; gap: 0.5rem; justify-self: center; }

    .period-pill {
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--muted);
      padding: 0.3rem 0.95rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surf2);
      cursor: pointer;
      transition: all .2s;
    }
    .period-pill:hover { color: var(--accent); border-color: var(--accent); }
    .period-pill.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .tb-right {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      justify-self: end;
    }

    #slideCounter {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--sub);
      padding: 0.25rem 0.65rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    .kb-hint {
      font-size: 0.62rem;
      color: var(--muted);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
    }

    /* ═════════════════════════════════════════════
       SLIDE FRAME
    ═════════════════════════════════════════════ */
    .slide-frame {
      padding: 16px 18px;
      overflow: hidden;
    }

    .slide {
      height: 100%;
      background: var(--surf);
      border-radius: 20px;
      box-shadow: var(--shadow-l);
      overflow: hidden;
      position: relative;
      transition: opacity .18s ease;
    }
    .slide.fading { opacity: 0; }

    /* ═════════════════════════════════════════════
       BOTTOM BAR
    ═════════════════════════════════════════════ */
    .bar-bottom {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      background: var(--surf);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 8px rgba(13,27,42,0.05);
      padding: 0 1.5rem;
    }

    .btn-nav {
      background: var(--surf2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--sub);
      font-family: 'Pretendard', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.5rem 1.6rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, transform .1s;
    }
    .btn-nav:hover:not(:disabled) {
      background: var(--surf3);
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn-nav:active:not(:disabled) { transform: scale(0.97); }
    .btn-nav:disabled { opacity: 0.3; cursor: default; }

    .btn-next {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: var(--shadow-m);
    }
    .btn-next:hover:not(:disabled) {
      background: color-mix(in srgb, var(--accent) 85%, black);
      color: #fff;
      border-color: transparent;
    }

    .prog-rail {
      flex: 1;
      height: 5px;
      background: var(--surf3);
      border-radius: 999px;
      overflow: hidden;
    }
    .prog-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width .35s ease, background .4s;
    }

    /* ═════════════════════════════════════════════════════════════════════
       SLIDE TYPE STYLES
    ═════════════════════════════════════════════════════════════════════ */

    /* ─── COVER ─── */
    .s-cover {
      height: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 55%, #0D1B2A) 100%);
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem;
      position: relative;
      overflow: hidden;
    }
    .s-cover::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      top: -250px; right: -250px;
    }
    .s-cover::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      bottom: -180px; left: -180px;
    }
    .cv-kick {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: rgba(255,255,255,0.8);
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      padding: 0.45rem 1.3rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      margin-bottom: 2.5rem;
      z-index: 1;
    }
    .cv-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(4rem, 9vw, 7.5rem);
      line-height: 1.05;
      letter-spacing: -0.02em;
      white-space: pre-line;
      text-shadow: 0 4px 24px rgba(0,0,0,0.2);
      z-index: 1;
    }
    .cv-sub {
      font-size: clamp(1rem, 1.5vw, 1.25rem);
      color: rgba(255,255,255,0.85);
      margin-top: 1.5rem;
      font-weight: 500;
      z-index: 1;
    }

    /* ─── ICEBREAK ─── */
    .s-ice {
      height: 100%;
      background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%);
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
    }
    .ic-head { margin-bottom: 2rem; }
    .ic-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: #78350F;
      line-height: 1.15;
    }
    .ic-sub {
      font-size: clamp(1rem, 1.4vw, 1.2rem);
      color: #92400E;
      margin-top: 0.5rem;
      font-weight: 500;
    }
    .ic-items {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
      justify-content: center;
    }
    .ic-item {
      display: flex;
      align-items: center;
      gap: 1.75rem;
      background: #fff;
      border-radius: 18px;
      padding: 1.35rem 2rem;
      box-shadow: 0 6px 20px rgba(217,119,6,0.15);
      border: 2px solid #FDE68A;
    }
    .ic-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 3vw, 2.8rem);
      color: #D97706;
      min-width: 85px;
      line-height: 1;
    }
    .ic-text {
      font-size: clamp(1.1rem, 1.7vw, 1.5rem);
      color: #78350F;
      font-weight: 600;
      line-height: 1.5;
    }

    /* ─── SECTION ─── */
    .s-section {
      height: 100%;
      background: #0D1B2A;
      color: #fff;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 6rem;
      position: relative;
      overflow: hidden;
    }
    .s-section::before {
      content: '';
      position: absolute;
      left: 0; top: 15%; bottom: 15%;
      width: 10px;
      background: var(--accent);
      border-radius: 0 10px 10px 0;
    }
    .s-section::after {
      content: '';
      position: absolute;
      width: 520px; height: 520px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 40%, transparent) 0%, transparent 70%);
      right: -150px; top: 50%;
      transform: translateY(-50%);
      filter: blur(30px);
    }
    .sc-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(4.5rem, 10vw, 8rem);
      color: transparent;
      -webkit-text-stroke: 2.5px color-mix(in srgb, var(--accent) 80%, transparent);
      line-height: 1;
      margin-bottom: 1.25rem;
      letter-spacing: -0.03em;
      z-index: 1;
    }
    .sc-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      line-height: 1.08;
      white-space: pre-line;
      margin-bottom: 1.25rem;
      letter-spacing: -0.02em;
      z-index: 1;
    }
    .sc-sub {
      font-size: clamp(1rem, 1.5vw, 1.3rem);
      color: rgba(255,255,255,0.65);
      font-weight: 500;
      max-width: 700px;
      z-index: 1;
    }

    /* ─── GRID (6개 근무지) ─── */
    .s-grid {
      height: 100%;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .gr-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 4vw, 3rem);
      text-align: center;
      margin-bottom: 2.5rem;
      color: var(--text);
    }
    .gr-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.25rem;
    }
    .gr-card {
      background: var(--surf);
      border-radius: 18px;
      border: 2.5px solid var(--c);
      padding: 2rem 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: transform .2s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(13,27,42,0.06);
    }
    .gr-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(13,27,42,0.1);
    }
    .gr-icon { font-size: clamp(2.5rem, 4vw, 3.2rem); }
    .gr-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1rem, 1.6vw, 1.35rem);
      color: var(--c);
    }
    .gr-sub {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.14em;
    }

    /* ─── THEORY ─── */
    .s-theory {
      height: 100%;
      display: flex;
      gap: 3rem;
      padding: 3rem 3.5rem;
      align-items: center;
    }
    .s-theory.no-media {
      justify-content: center;
      padding: 4rem;
    }
    .s-theory.no-media .th-text {
      text-align: center;
      max-width: 800px;
    }
    .th-text { flex: 1; min-width: 0; }
    .th-tag {
      display: inline-block;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      border: 1.5px solid;
      margin-bottom: 1.5rem;
    }
    .th-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.3rem, 4.2vw, 3.6rem);
      line-height: 1.15;
      margin-bottom: 2rem;
      color: var(--text);
    }
    .th-points {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .th-points li {
      font-size: clamp(1.05rem, 1.6vw, 1.35rem);
      color: var(--sub);
      line-height: 1.6;
      padding-left: 1.75rem;
      position: relative;
      font-weight: 500;
    }
    .th-points li::before {
      content: '✓';
      position: absolute;
      left: 0;
      color: var(--accent);
      font-weight: 900;
      font-size: 1.1em;
    }
    .s-theory.no-media .th-points {
      align-items: center;
      text-align: left;
      max-width: 640px;
      margin: 0 auto;
    }
    .th-note {
      margin-top: 1.75rem;
      font-size: clamp(0.95rem, 1.4vw, 1.1rem);
      color: var(--accent);
      font-weight: 700;
      padding: 0.75rem 1rem;
      background: color-mix(in srgb, var(--accent) 8%, white);
      border-radius: 10px;
      border-left: 4px solid var(--accent);
    }
    .th-media {
      width: 45%;
      aspect-ratio: 4/3;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: var(--shadow-l);
      background: var(--surf3);
      flex-shrink: 0;
    }
    .th-media img, .th-media iframe {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border: none;
    }

    /* ─── STEPS ─── */
    .s-steps {
      height: 100%;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
    }
    .st-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.2rem, 4vw, 3.2rem);
      margin-bottom: 2rem;
      color: var(--text);
    }
    .st-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
      justify-content: center;
    }
    .st-item {
      display: flex;
      gap: 1.75rem;
      align-items: center;
      background: var(--surf2);
      padding: 1.15rem 1.75rem;
      border-radius: 14px;
      border-left: 5px solid var(--accent);
      transition: transform .15s;
    }
    .st-item:hover { transform: translateX(4px); }
    .st-num {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      color: var(--accent);
      min-width: 72px;
      line-height: 1;
    }
    .st-body { flex: 1; }
    .st-h {
      font-size: clamp(1.15rem, 1.7vw, 1.4rem);
      font-weight: 700;
      margin-bottom: 0.25rem;
      color: var(--text);
    }
    .st-p {
      font-size: clamp(0.9rem, 1.3vw, 1.05rem);
      color: var(--sub);
      line-height: 1.6;
    }

    /* ─── ACTIVITY ─── */
    .s-act {
      height: 100%;
      display: flex;
      gap: 2.5rem;
      padding: 3rem;
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 65%, #0D1B2A) 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .s-act::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -250px; right: 30%;
    }
    .ac-left {
      flex: 1.35;
      display: flex;
      flex-direction: column;
      justify-content: center;
      z-index: 1;
    }
    .ac-head {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .ac-icon { font-size: clamp(2.5rem, 4vw, 3.5rem); }
    .ac-tag {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .ac-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.3rem, 4.2vw, 3.5rem);
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .ac-desc {
      font-size: clamp(1.05rem, 1.6vw, 1.3rem);
      color: rgba(255,255,255,0.9);
      margin-bottom: 1.75rem;
      font-weight: 500;
    }
    .ac-rules {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      margin-bottom: 1.5rem;
    }
    .ac-rule {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      background: rgba(255,255,255,0.13);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 0.7rem 1.15rem;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .ac-ri {
      font-family: 'Archivo Black', sans-serif;
      font-size: 1rem;
      background: #fff;
      color: var(--accent);
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ac-rt {
      font-size: clamp(0.95rem, 1.3vw, 1.1rem);
      font-weight: 500;
    }
    .ac-hint {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.25);
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border-left: 3px solid #fff;
      font-weight: 500;
    }
    .ac-right {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .ac-qr-card {
      background: #fff;
      border-radius: 22px;
      padding: 1.5rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      color: var(--text);
      text-align: center;
      max-width: 300px;
    }
    .ac-qr-label {
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 0.85rem;
    }
    .ac-qr-box img {
      display: block;
      max-width: 100%;
      width: 220px;
      height: 220px;
    }
    .qr-placeholder {
      width: 220px; height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
      background: var(--surf2);
      border-radius: 10px;
    }
    .ac-qr-url {
      margin-top: 0.75rem;
      font-size: 0.68rem;
      color: var(--sub);
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.65rem;
      word-break: break-all;
      line-height: 1.4;
    }

    /* ─── CLOSING PERIOD (쉬는시간) ─── */
    .s-cp {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem;
      background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
    }
    .cp-icon {
      font-size: clamp(3.5rem, 6vw, 5rem);
      margin-bottom: 1rem;
    }
    .cp-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .cp-sub {
      font-size: clamp(1.05rem, 1.6vw, 1.3rem);
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 2rem;
    }
    .cp-body {
      font-size: clamp(1.1rem, 1.7vw, 1.35rem);
      color: var(--text);
      line-height: 1.8;
      white-space: pre-line;
      max-width: 680px;
      margin-bottom: 2rem;
      font-weight: 500;
    }
    .cp-meta {
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      color: var(--muted);
      letter-spacing: 0.2em;
      font-weight: 700;
    }

    /* ─── TRIAGE CARDS (4색) ─── */
    .s-tri {
      height: 100%;
      padding: 2.5rem 3.5rem;
      display: flex;
      flex-direction: column;
    }
    .tr-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.1rem, 3.8vw, 3rem);
      text-align: center;
      margin-bottom: 1.75rem;
      color: var(--text);
    }
    .tr-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      flex: 1;
    }
    .tr-card {
      background: var(--surf);
      border-radius: 16px;
      border-left: 10px solid var(--c);
      padding: 1.35rem 1.75rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(13,27,42,0.08);
      gap: 0.4rem;
    }
    .tr-row {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }
    .tr-label {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.4rem, 2.3vw, 1.9rem);
      color: var(--c);
    }
    .tr-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      font-weight: 700;
    }
    .tr-desc {
      font-size: clamp(0.95rem, 1.35vw, 1.15rem);
      color: var(--text);
      font-weight: 600;
      line-height: 1.5;
    }
    .tr-ex {
      font-size: clamp(0.78rem, 1vw, 0.9rem);
      color: var(--sub);
      line-height: 1.5;
      background: var(--surf2);
      padding: 0.45rem 0.65rem;
      border-radius: 8px;
      margin-top: 0.35rem;
    }

    /* ─── TYPES GRID (5개 유형) ─── */
    .s-types {
      height: 100%;
      padding: 2.5rem 3rem;
      display: flex;
      flex-direction: column;
    }
    .tp-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.1rem, 3.8vw, 3rem);
      text-align: center;
      margin-bottom: 2rem;
      color: var(--text);
    }
    .tp-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
      flex: 1;
    }
    .tp-card {
      background: var(--surf);
      border-radius: 14px;
      border-top: 5px solid var(--c);
      padding: 1.5rem 1rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(13,27,42,0.06);
      gap: 0.4rem;
      transition: transform .2s;
    }
    .tp-card:hover { transform: translateY(-4px); }
    .tp-icon { font-size: clamp(2rem, 3.2vw, 2.8rem); }
    .tp-name {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(0.9rem, 1.3vw, 1.05rem);
      color: var(--c);
      line-height: 1.15;
    }
    .tp-label {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }
    .tp-desc {
      font-size: clamp(0.78rem, 1.1vw, 0.92rem);
      color: var(--sub);
      line-height: 1.5;
      margin-top: 0.3rem;
    }

    /* ─── QA GRID ─── */
    .s-qa-grid {
      height: 100%;
      padding: 3rem 4rem;
      display: flex;
      flex-direction: column;
    }
    .qg-head {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .qg-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.1rem, 3.8vw, 3rem);
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .qg-sub {
      font-size: clamp(0.95rem, 1.4vw, 1.15rem);
      color: var(--muted);
      font-weight: 500;
    }
    .qg-chips {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      flex: 1;
      align-content: center;
    }
    .qg-chip {
      background: var(--surf);
      border-radius: 16px;
      border: 2px solid var(--border);
      padding: 1.5rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: center;
      box-shadow: 0 4px 14px rgba(13,27,42,0.05);
      transition: transform .2s, border-color .2s;
    }
    .qg-chip:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
    }
    .qg-icon { font-size: clamp(2rem, 3vw, 2.5rem); }
    .qg-q {
      font-size: clamp(0.9rem, 1.3vw, 1.05rem);
      font-weight: 700;
      color: var(--text);
      text-align: center;
    }

    /* ─── QA OPEN ─── */
    .s-qa-open {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 3rem;
      background: linear-gradient(135deg, #F0F9FF 0%, #E0F2FE 100%);
    }
    .qo-mark {
      font-size: clamp(4.5rem, 7vw, 6.5rem);
      margin-bottom: 1rem;
    }
    .qo-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.8rem, 5vw, 4.2rem);
      color: var(--text);
      margin-bottom: 0.5rem;
      line-height: 1.1;
    }
    .qo-sub {
      font-size: clamp(1.1rem, 1.6vw, 1.35rem);
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 2rem;
    }
    .qo-tip {
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      color: var(--text);
      line-height: 1.9;
      white-space: pre-line;
      max-width: 680px;
      background: rgba(255,255,255,0.8);
      padding: 1.75rem 2rem;
      border-radius: 16px;
      border-left: 5px solid var(--accent);
      font-weight: 500;
    }

    /* ─── CLOSING (최종) ─── */
    .s-closing {
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem;
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 60%, #0D1B2A) 100%);
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .s-closing::before {
      content: '';
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      top: -300px; right: -300px;
    }
    .cl-heart {
      font-size: clamp(3.5rem, 6vw, 5rem);
      margin-bottom: 1.5rem;
      z-index: 1;
    }
    .cl-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2.3rem, 4.5vw, 3.8rem);
      line-height: 1.3;
      white-space: pre-line;
      margin-bottom: 1.75rem;
      z-index: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.2);
    }
    .cl-sub {
      font-size: clamp(1.05rem, 1.6vw, 1.3rem);
      color: rgba(255,255,255,0.85);
      margin-bottom: 2.5rem;
      max-width: 700px;
      z-index: 1;
      font-weight: 500;
    }
    .cl-meta {
      font-size: clamp(0.95rem, 1.3vw, 1.1rem);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.1em;
      font-weight: 700;
      z-index: 1;
    }
  </style>
</head>
<body>

<div class="stage">

  <!-- TOP BAR -->
  <header class="bar-top">
    <div class="tb-logo">🏥 NURSE AVENGERS <span>선생님 수업 자료</span></div>
    <div class="tb-center">
      <button id="p1Btn" class="period-pill" onclick="jumpPeriod(1)">1교시</button>
      <button id="p2Btn" class="period-pill" onclick="jumpPeriod(2)">2교시</button>
    </div>
    <div class="tb-right">
      <div id="slideCounter" class="mono">1 / 29</div>
      <div class="kb-hint mono">← → Space</div>
    </div>
  </header>

  <!-- SLIDE FRAME -->
  <div class="slide-frame">
    <div class="slide" id="slide"></div>
  </div>

  <!-- BOTTOM BAR -->
  <footer class="bar-bottom">
    <button id="prevBtn" class="btn-nav" onclick="prev()">← 이전</button>
    <div class="prog-rail"><div id="progBar" class="prog-fill"></div></div>
    <button id="nextBtn" class="btn-nav btn-next" onclick="next()">다음 →</button>
  </footer>

</div>

<script src="teacher.js"></script>
</body>
</html>
