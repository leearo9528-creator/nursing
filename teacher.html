<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nurse Avengers — 선생님 화면</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F0F4FF;
      --surf:     #FFFFFF;
      --surf2:    #F8FAFC;
      --surf3:    #EEF2F7;
      --text:     #0D1B2A;
      --sub:      #334155;
      --muted:    #7C8FA6;
      --border:   rgba(13,27,42,0.09);
      --accent:   #0891B2;           /* updated per lesson by JS */
      --shadow-s: 0 1px 3px rgba(13,27,42,0.07);
      --shadow-m: 0 4px 16px rgba(13,27,42,0.10);
      --shadow-l: 0 12px 40px rgba(13,27,42,0.13);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .mono { font-family: 'JetBrains Mono', monospace; letter-spacing: 0.03em; }

    /* ─────────────────────────────────────────
       GRID LAYOUT
    ───────────────────────────────────────── */
    .layout {
      display: grid;
      grid-template-columns: 256px 1fr 220px;
      grid-template-rows: 58px 1fr 68px;
      height: 100vh;
      transition: grid-template-columns .25s ease;
    }
    .layout.sidebar-collapsed {
      grid-template-columns: 46px 1fr 220px;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: var(--surf);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow-s);
      position: relative;
    }

    /* thin color bar at bottom of header, reflects current lesson */
    .header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent);
      transition: background .4s ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-mark {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: background .4s ease;
    }

    .header-logo {
      font-family: 'Archivo Black', sans-serif;
      font-size: 0.92rem;
      color: var(--text);
      letter-spacing: 0.04em;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .period-pill {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      padding: 0.24rem 0.8rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surf2);
      transition: all .25s;
      cursor: default;
    }
    .period-pill.active {
      color: #fff;
      background: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .dot-row { display: flex; gap: 5px; align-items: center; }
    .l-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--surf3); border: 1.5px solid var(--border);
      cursor: pointer; transition: transform .15s, background .2s;
    }
    .l-dot:hover    { transform: scale(1.3); }
    .l-dot.active   { background: var(--accent); border-color: var(--accent); }
    .l-dot.done     { background: var(--muted); border-color: var(--muted); opacity: 0.5; }

    .header-hint {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.25rem 0.6rem;
    }

    /* ─────────────────────────────────────────
       SIDEBAR LEFT — Lesson Flow
    ───────────────────────────────────────── */
    .sidebar-left {
      background: var(--surf);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.9rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 46px;
    }

    .sidebar-title {
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .sidebar-toggle {
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      border-radius: 7px;
      background: var(--surf2);
      color: var(--muted);
      font-size: 0.65rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: color .15s, border-color .15s, background .15s;
    }
    .sidebar-toggle:hover { color: var(--accent); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, white); }

    .sidebar-body { overflow-y: auto; flex: 1; padding: 0.5rem 0; }

    .layout.sidebar-collapsed .sidebar-title,
    .layout.sidebar-collapsed .sidebar-body  { display: none; }
    .layout.sidebar-collapsed .sidebar-header { justify-content: center; padding: 0.7rem 0; }

    /* lesson list items */
    .lesson-item {
      display: flex;
      align-items: flex-start;
      gap: 0.65rem;
      padding: 0.65rem 0.9rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      position: relative;
    }
    .lesson-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--lesson-color, transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .lesson-item:hover   { background: var(--surf2); }
    .lesson-item.active  { background: color-mix(in srgb, var(--lesson-color, var(--accent)) 8%, white); }
    .lesson-item.active::before { opacity: 1; }

    .lesson-item-step {
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--lesson-color, var(--muted));
      font-weight: 700;
      letter-spacing: 0.05em;
      min-width: 36px;
      padding-top: 0.1rem;
    }
    .lesson-item-info { flex: 1; min-width: 0; }
    .lesson-item-label {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 0.1rem;
    }
    .lesson-item-meta {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .lesson-item-tag {
      font-size: 0.58rem;
      color: var(--lesson-color, var(--muted));
      background: color-mix(in srgb, var(--lesson-color, gray) 12%, white);
      border-radius: 4px;
      padding: 0.05rem 0.35rem;
    }
    .lesson-item-dur { font-size: 0.6rem; color: var(--muted); }

    /* ─────────────────────────────────────────
       MAIN — SLIDE
    ───────────────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 1.5rem 2rem 1.25rem;
      gap: 0.9rem;
      background: var(--bg);
    }

    /* meta row */
    .slide-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .lesson-tag {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.06em;
      padding: 0.2rem 0.65rem;
      border-radius: 6px;
      border: 1.5px solid;
      font-weight: 700;
    }

    .lesson-label {
      font-size: 0.8rem;
      color: var(--sub);
      font-weight: 500;
    }

    .lesson-time {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      font-weight: 700;
      color: #92400E;
      background: #FEF3C7;
      border: 1.5px solid #FCD34D;
      border-radius: 999px;
      padding: 0.18rem 0.65rem;
    }

    /* progress bar */
    .progress-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }
    .slide-progress-wrap {
      flex: 1;
      height: 5px;
      background: var(--surf3);
      border-radius: 999px;
      overflow: hidden;
    }
    .slide-progress {
      height: 100%;
      border-radius: 999px;
      transition: width .35s ease, background .4s;
    }
    #slideCount {
      font-size: 0.65rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── SLIDE CARD ── */
    .slide-card {
      flex: 1;
      background: var(--surf);
      border-radius: 20px;
      box-shadow: var(--shadow-l);
      display: flex;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    /* left accent strip */
    .slide-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--accent);
      transition: background .4s ease;
      border-radius: 20px 0 0 20px;
    }

    .slide-layout {
      flex: 1;
      display: flex;
      gap: 0;
      align-items: stretch;
      padding: 2.5rem 2.5rem 2.5rem 3rem;
      overflow: hidden;
    }

    .slide-text {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding-right: 1.5rem;
    }

    /* title kicker */
    .slide-kicker {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      color: var(--accent);
      transition: color .4s;
    }

    #slideTitle {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(1.9rem, 3.4vw, 3.2rem);
      line-height: 1.18;
      color: var(--text);
      margin-bottom: 1.25rem;
      white-space: pre-line;
      word-break: keep-all;
    }

    #slideBody {
      font-size: clamp(1rem, 1.6vw, 1.3rem);
      line-height: 1.85;
      color: var(--sub);
      white-space: pre-line;
      word-break: keep-all;
    }

    /* image / video */
    .slide-image-wrap {
      width: 40%;
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
      background: var(--surf3);
      display: none;
      position: relative;
    }
    .slide-image-wrap.has-image { display: block; }
    .slide-image-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .slide-image-wrap iframe {
      display: none;
      width: 100%; height: 100%;
      border: none;
    }

    /* no-image: center all */
    .slide-layout.no-image {
      align-items: center;
      padding: 3rem 4rem;
    }
    .slide-layout.no-image .slide-text {
      align-items: center;
      text-align: center;
      padding-right: 0;
    }
    .slide-layout.no-image #slideTitle { font-size: clamp(2.2rem, 4.2vw, 4rem); }
    .slide-layout.no-image #slideBody  { font-size: clamp(1.05rem, 1.8vw, 1.45rem); max-width: 680px; }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    .footer {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      background: var(--surf);
      border-top: 1px solid var(--border);
      box-shadow: 0 -2px 8px rgba(13,27,42,0.05);
      padding: 0 1.5rem;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surf2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--sub);
      font-family: 'Pretendard', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 0.55rem 1.75rem;
      cursor: pointer;
      transition: background .15s, border-color .15s, color .15s, transform .1s, box-shadow .15s;
    }
    .nav-btn:hover:not(:disabled) {
      background: var(--surf3);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 12%, transparent);
    }
    .nav-btn:active:not(:disabled) { transform: scale(0.97); }
    .nav-btn:disabled { opacity: 0.28; cursor: default; }

    .nav-btn-next {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: var(--shadow-m);
      transition: background .15s, transform .1s, box-shadow .15s;
    }
    .nav-btn-next:hover:not(:disabled) {
      background: color-mix(in srgb, var(--accent) 85%, black);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .nav-hint {
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      padding: 0.25rem 0.6rem;
      background: var(--surf2);
      border: 1px solid var(--border);
      border-radius: 6px;
    }

    /* ─────────────────────────────────────────
       SIDEBAR RIGHT — QR
    ───────────────────────────────────────── */
    .sidebar-right {
      background: var(--surf);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1.1rem;
      gap: 0.85rem;
    }

    .qr-header {
      text-align: center;
    }
    .qr-eyebrow {
      font-size: 0.58rem;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }
    .qr-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text);
    }

    #qrcode {
      background: var(--surf);
      border-radius: 14px;
      border: 2px solid var(--border);
      padding: 10px;
      box-shadow: var(--shadow-m);
    }
    #qrcode img, #qrcode canvas { display: block; }

    .qr-url {
      font-size: 0.62rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      word-break: break-all;
      text-align: center;
      background: color-mix(in srgb, var(--accent) 8%, white);
      border: 1px solid color-mix(in srgb, var(--accent) 25%, white);
      border-radius: 8px;
      padding: 0.4rem 0.6rem;
      line-height: 1.5;
      transition: background .4s, border-color .4s, color .4s;
    }

    /* scan badge */
    .scan-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.68rem;
      font-weight: 600;
      color: #fff;
      background: var(--accent);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      width: 100%;
      justify-content: center;
      transition: background .4s;
    }

    /* ─────────────────────────────────────────
       COVER SLIDE
    ───────────────────────────────────────── */
    .slide-card.cover-slide {
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 70%, #0D1B2A) 100%);
      box-shadow: 0 16px 56px color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .slide-card.cover-slide::before { display: none; }

    .slide-card.cover-slide .slide-layout {
      align-items: center;
      text-align: center;
      padding: 3rem 5rem;
    }
    .slide-card.cover-slide .slide-text { align-items: center; padding-right: 0; }

    .slide-card.cover-slide .slide-kicker {
      color: rgba(255,255,255,0.75);
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 0.3rem 1rem;
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      margin-bottom: 1.25rem;
    }
    .slide-card.cover-slide #slideTitle {
      font-size: clamp(3rem, 6vw, 5.5rem);
      color: #fff;
      line-height: 1.1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.2);
      margin-bottom: 1.25rem;
    }
    .slide-card.cover-slide #slideBody {
      font-size: clamp(0.95rem, 1.5vw, 1.2rem);
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }

    /* ─────────────────────────────────────────
       ICEBREAK SLIDE
    ───────────────────────────────────────── */
    .slide-card.icebreak-slide {
      background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%);
      border: 2px solid #FCD34D;
      box-shadow: 0 12px 40px rgba(217,119,6,0.18);
    }
    .slide-card.icebreak-slide::before { background: #D97706; }

    .slide-card.icebreak-slide .slide-layout {
      align-items: flex-start;
      padding: 2.5rem 3.5rem;
    }
    .slide-card.icebreak-slide .slide-text { padding-right: 0; }

    .slide-card.icebreak-slide .slide-kicker {
      color: #92400E;
      font-size: 0.72rem;
    }
    .slide-card.icebreak-slide #slideTitle {
      font-size: clamp(2rem, 3.5vw, 3rem);
      color: #78350F;
      margin-bottom: 1.5rem;
    }
    .slide-card.icebreak-slide #slideBody {
      font-size: clamp(1.05rem, 1.7vw, 1.4rem);
      color: #92400E;
      line-height: 2.1;
      background: rgba(255,255,255,0.6);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
      border: 1px solid rgba(217,119,6,0.2);
    }

    /* ─────────────────────────────────────────
       TRANSITIONS
    ───────────────────────────────────────── */
    #slideTitle, #slideBody, .slide-kicker { transition: opacity .2s ease; }
    .slide-changing #slideTitle,
    .slide-changing #slideBody,
    .slide-changing .slide-kicker { opacity: 0; }
  </style>
</head>
<body>
<div class="layout" id="layout">

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <div class="logo-mark">🏥</div>
      <div class="header-logo">NURSE AVENGERS <span style="font-family:'Pretendard';font-weight:400;color:var(--muted);font-size:0.78rem;margin-left:0.3rem">선생님 화면</span></div>
    </div>

    <div class="header-center">
      <div id="period1Ind" class="period-pill">1교시</div>
      <div id="period2Ind" class="period-pill">2교시</div>
      <div class="dot-row" id="lessonDots"></div>
    </div>

    <div class="header-hint mono">← → Space · 슬라이드 이동</div>
  </header>

  <!-- SIDEBAR LEFT -->
  <aside class="sidebar-left">
    <div class="sidebar-header">
      <div class="sidebar-title">수업 흐름</div>
      <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">✕</button>
    </div>
    <div class="sidebar-body">
      <div id="lessonList"></div>
    </div>
  </aside>

  <!-- MAIN SLIDE -->
  <main class="main">
    <div class="slide-meta">
      <div id="lessonTag" class="lesson-tag">이론</div>
      <div id="lessonLabel" class="lesson-label">1교시 · STEP 1</div>
      <div id="lessonTime" class="lesson-time">⏱ 8분</div>
    </div>

    <div class="progress-row">
      <div class="slide-progress-wrap">
        <div id="slideProgress" class="slide-progress" style="width:14%"></div>
      </div>
      <div id="slideCount" class="mono">1 / 7</div>
    </div>

    <div class="slide-card" id="slideCard">
      <div class="slide-layout" id="slideLayout">
        <div class="slide-text">
          <div class="slide-kicker" id="slideKicker"></div>
          <div id="slideTitle">슬라이드 제목</div>
          <div id="slideBody">내용이 여기에 표시됩니다.</div>
        </div>
        <div class="slide-image-wrap" id="slideImageWrap">
          <img id="slideImg" src="" alt="">
          <iframe id="slideVideo" src=""
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen></iframe>
        </div>
      </div>
    </div>
  </main>

  <!-- SIDEBAR RIGHT — QR -->
  <aside class="sidebar-right">
    <div class="qr-header">
      <div class="qr-eyebrow">학생 접속</div>
      <div class="qr-title">QR 스캔</div>
    </div>
    <div id="qrcode"></div>
    <div id="studentUrl" class="qr-url">로딩 중...</div>
    <div class="scan-badge">📱 폰으로 스캔하세요</div>
  </aside>

  <!-- FOOTER -->
  <footer class="footer">
    <button id="prevBtn" class="nav-btn" onclick="prevSlide()">← 이전</button>
    <div class="nav-hint">Space / →</div>
    <button id="nextBtn" class="nav-btn nav-btn-next" onclick="nextSlide()">다음 →</button>
  </footer>

</div>
<script src="teacher.js"></script>
<script>
  (() => {
    const dotsEl = document.getElementById('lessonDots');
    if (dotsEl && typeof LESSON !== 'undefined') {
      dotsEl.innerHTML = LESSON.map((_,i) =>
        `<div class="l-dot" onclick="goToLesson(${i})" title="${LESSON[i].label}"></div>`
      ).join('');
    }
  })();
</script>
</body>
</html>
